<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1a20"/>
      <stop offset="100%" stop-color="#14131a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#p1bg)"/>
  <circle cx="330" cy="40" r="90" fill="#d6f24c" opacity="0.15"/>

  <!-- abstract logo mark -->
  <g transform="translate(150 90)">
    <rect x="0" y="0" width="100" height="100" rx="24" fill="none" stroke="#d6f24c" stroke-width="6"/>
    <circle cx="50" cy="50" r="26" fill="#ff5d3a"/>
    <rect x="38" y="38" width="24" height="24" rx="6" fill="#14131a"/>
  </g>

  <!-- palette swatches -->
  <g transform="translate(130 210)">
    <circle cx="0" cy="0" r="12" fill="#d6f24c"/>
    <circle cx="34" cy="0" r="12" fill="#ff5d3a"/>
    <circle cx="68" cy="0" r="12" fill="#5b7cff"/>
    <circle cx="102" cy="0" r="12" fill="#ffb8c6"/>
    <circle cx="136" cy="0" r="12" fill="#ffffff"/>
  </g>
  <text x="200" y="255" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.55" text-anchor="middle" letter-spacing="2">BRAND IDENTITY</text>
</svg>
