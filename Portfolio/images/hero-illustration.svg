<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="heroBlob" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffd7de"/>
      <stop offset="55%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#f6f1e7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6f24c"/>
      <stop offset="100%" stop-color="#9fd12f"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#ff5d3a"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fa8ff"/>
      <stop offset="100%" stop-color="#5b7cff"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#14131a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <circle cx="300" cy="300" r="280" fill="url(#heroBlob)"/>

  <!-- floating dotted grid -->
  <g fill="#14131a" opacity="0.18">
    <circle cx="70" cy="120" r="3"/><circle cx="90" cy="120" r="3"/><circle cx="110" cy="120" r="3"/>
    <circle cx="70" cy="140" r="3"/><circle cx="90" cy="140" r="3"/><circle cx="110" cy="140" r="3"/>
    <circle cx="70" cy="160" r="3"/><circle cx="90" cy="160" r="3"/><circle cx="110" cy="160" r="3"/>
  </g>

  <!-- coral rotated square -->
  <rect x="465" y="90" width="70" height="70" rx="18" fill="#ff5d3a" transform="rotate(18 500 125)"/>

  <!-- lime circle -->
  <circle cx="520" cy="330" r="26" fill="#d6f24c"/>

  <!-- blue plus -->
  <g transform="translate(80 430)">
    <rect x="-4" y="-18" width="8" height="36" rx="4" fill="#5b7cff"/>
    <rect x="-18" y="-4" width="36" height="8" rx="4" fill="#5b7cff"/>
  </g>

  <!-- browser mockup, tilted -->
  <g transform="rotate(-4 300 300)" filter="url(#softShadow)">
    <rect x="120" y="140" width="360" height="300" rx="20" fill="#ffffff"/>
    <rect x="120" y="140" width="360" height="34" rx="20" fill="#14131a"/>
    <rect x="120" y="156" width="360" height="18" fill="#14131a"/>
    <circle cx="140" cy="157" r="5" fill="#ff5d3a"/>
    <circle cx="156" cy="157" r="5" fill="#d6f24c"/>
    <circle cx="172" cy="157" r="5" fill="#5b7cff"/>

    <!-- nav line -->
    <rect x="140" y="192" width="60" height="10" rx="5" fill="#14131a" opacity="0.85"/>
    <rect x="392" y="192" width="68" height="16" rx="8" fill="url(#barGrad)"/>

    <!-- hero block -->
    <rect x="140" y="222" width="180" height="14" rx="7" fill="#14131a"/>
    <rect x="140" y="244" width="130" height="10" rx="5" fill="#6b6f76"/>
    <rect x="140" y="264" width="90" height="26" rx="13" fill="#14131a"/>

    <!-- cards -->
    <rect x="140" y="312" width="98" height="98" rx="14" fill="url(#cardGrad)"/>
    <rect x="251" y="312" width="98" height="98" rx="14" fill="url(#cardGrad2)"/>
    <rect x="362" y="312" width="98" height="98" rx="14" fill="#f6f1e7" stroke="#14131a" stroke-opacity="0.12" stroke-width="2"/>
    <rect x="378" y="386" width="66" height="8" rx="4" fill="#14131a" opacity="0.7"/>
    <rect x="378" y="368" width="50" height="8" rx="4" fill="#14131a" opacity="0.4"/>
  </g>

  <!-- code badge -->
  <g transform="translate(150 470)" filter="url(#softShadow)">
    <rect x="0" y="0" width="86" height="52" rx="16" fill="#14131a"/>
    <text x="43" y="33" font-family="monospace" font-size="20" font-weight="700" fill="#d6f24c" text-anchor="middle">&lt;/&gt;</text>
  </g>
</svg>
